name: Deploy to GitHub Pages (Vite)

on:
  push:
    branches: [ main ]  # cada push a main dispara el deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # necesario para publicar a gh-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci || npm i

      - name: Build
        run: npm run build

      # Copiamos index.html como 404.html para SPA (React Router)
      - name: Create 404.html for SPA
        run: cp dist/index.html dist/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
